name: Python CI

on:
  push:
  pull_request:

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python-exam-minimal/requirements.txt

      - name: Install dependencies
        working-directory: python-exam-minimal
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Lint
        working-directory: python-exam-minimal
        run: ruff check .

      - name: Test
        working-directory: python-exam-minimal
        run: pytest -q

      - name: Build gate
        working-directory: python-exam-minimal
        run: python -m compileall app tests
