name: Python CI (TODO)

on:
  # TODO: push + pull_request 트리거 설정
  push:
  pull_request:

jobs:
  quality:
    # TODO: matrix 2축 이상 설정 (예: os, python-version)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        # TODO: actions/setup-python 사용 및 버전 매트릭스 연결
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python-exam-minimal/requirements.txt

      - name: Install dependencies
        # TODO: requirements 설치
        working-directory: python-exam-minimal
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Lint
        # TODO: ruff check 실행
        working-directory: python-exam-minimal
        run: ruff check .

      - name: Test
        # TODO: pytest 실행
        working-directory: python-exam-minimal
        run: pytest -q

      - name: Build gate
        # TODO: 빌드 게이트 1개 이상
        working-directory: python-exam-minimal
        run: python -m compileall app tests
